name: Flutter Build APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
          cache: true

      - name: Create Moralis secrets file
        env:
          MORALIS_KEY: ${{ secrets.MORALIS_API_KEY }}
        run: |
          mkdir -p secrets
          printf '{"MORALIS_API_KEY":"%s"}\n' "$MORALIS_KEY" > secrets/moralis.json

      - name: Patch Reown Dashboard
        shell: pwsh
        run: ./patch_reown_dashboard.ps1

      - name: Install dependencies
        run: flutter pub get

      - name: Verify analysis
        run: flutter analyze

      - name: Build APK (Debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: drainshield-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
